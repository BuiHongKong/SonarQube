name: SonarQube Cloud

on:
  # Phan tich sau khi code duoc merge/push vao main
  push:
    branches:
      - main
  # Phan tich PR truoc khi merge (de Quality Gate chan merge khi co loi)
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: Build and analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Tat shallow clone de Sonar tinh "new code" chinh xac
          fetch-depth: 0

      # --- Backend Python: chay test + sinh coverage TRUOC khi scan ---
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Python tests with coverage
        run: pytest --cov=python --cov-report=xml --cov-report=term
        # Sinh ra coverage.xml o thu muc goc (khop sonar.python.coverage.reportPaths)

      # --- Frontend/JS: chay jest + sinh lcov TRUOC khi scan ---
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install JS dependencies
        run: npm install

      - name: Run JS tests with coverage
        run: npm test
        # Sinh ra coverage/lcov.info (khop sonar.javascript.lcov.reportPaths)

      # --- Sonar doc coverage.xml + lcov.info qua sonar-project.properties ---
      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          # Token luu trong GitHub Secrets, KHONG hardcode trong repo
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
