# SonarQube project configuration
# LƯU Ý BẢO MẬT: KHÔNG đặt sonar.token / sonar.login vào file này.
# Token phải truyền lúc scan qua biến môi trường SONAR_TOKEN hoặc tham số dòng lệnh.

# LƯU Ý: projectKey và organization phải khớp giá trị SonarCloud cấp cho project.
# Xem tại: SonarCloud -> project -> Information, hoặc trong wizard "Analyze new project".
sonar.organization=<YOUR_ORG_KEY>
sonar.projectKey=<YOUR_ORG_KEY>_sonarqube-demo-buggy
sonar.projectName=SonarQube Demo Buggy

# Nguồn code cần phân tích
sonar.sources=python,javascript
sonar.sourceEncoding=UTF-8

# Cấu hình ngôn ngữ
sonar.python.version=3.11

# (Tùy chọn) URL server được truyền lúc scan, ví dụ:
# sonar.host.url=https://<your-sonarqube-host>
