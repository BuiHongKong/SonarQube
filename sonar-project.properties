# SonarQube project configuration
# LƯU Ý BẢO MẬT: KHÔNG đặt sonar.token / sonar.login vào file này.
# Token phải truyền lúc scan qua biến môi trường SONAR_TOKEN hoặc tham số dòng lệnh.

# LƯU Ý: projectKey và organization phải khớp giá trị SonarCloud cấp cho project.
# Xem tại: SonarCloud -> project -> Information, hoặc trong wizard "Analyze new project".
sonar.organization=buihongkong
sonar.projectKey=BuiHongKong_SonarQube
sonar.projectName=SonarQube

# Nguồn code cần phân tích
sonar.sources=python,javascript
sonar.sourceEncoding=UTF-8

# Thư mục chứa test (tách khỏi source để không bị tính là code cần coverage)
sonar.tests=tests

# Báo cáo coverage do pytest-cov sinh ra (Cobertura XML)
sonar.python.coverage.reportPaths=coverage.xml

# Báo cáo coverage do jest sinh ra (LCOV)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Cấu hình ngôn ngữ
sonar.python.version=3.11

# (Tùy chọn) URL server được truyền lúc scan, ví dụ:
# sonar.host.url=https://<your-sonarqube-host>
